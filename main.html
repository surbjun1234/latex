<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaTeX to PDF 생성기</title>
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 180px;
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            resize: vertical;
        }
        .button-group {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        button {
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .btn-preview {
            background-color: #3498db;
            color: white;
        }
        .btn-preview:hover {
            background-color: #2980b9;
        }
        .btn-download {
            background-color: #2ecc71;
            color: white;
        }
        .btn-download:hover {
            background-color: #27ae60;
        }
        #pdf-content {
            background: white;
            padding: 40px;
            min-height: 200px;
            border: 1px dashed #bdc3c7;
            border-radius: 4px;
            font-size: 16px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <h1>LaTeX to PDF 변환기</h1>

    <div class="container">
        <h3>1. LaTeX 텍스트 입력</h3>
        <p style="font-size: 13px; color: #7f8c8d;">수식은 <code>$$ 수식 $$</code> (가운데 정렬) 또는 <code>\\( 수식 \\)</code> (인라인) 형태로 입력하세요.</p>
        
        <textarea id="latex-input"></textarea>
        
        <div class="button-group">
            <button class="btn-preview" onclick="renderLaTeX()">미리보기 (렌더링)</button>
            <button class="btn-download" onclick="downloadPDF()">PDF 다운로드</button>
        </div>
    </div>

    <div class="container">
        <h3>2. 미리보기 / PDF 출력 영역</h3>
        <div id="pdf-content"></div>
    </div>

    <script>
        // 초기 기본 예제 텍스트 정의
        const defaultText = `슈뢰딩거 방정식(Schrödinger equation)은 다음과 같이 표현됩니다:

$$ i\\hbar \\frac{\\partial}{\\partial t} \\Psi(\\mathbf{r},t) = \\left[ -\\frac{\\hbar^2}{2m}\\nabla^2 + V(\\mathbf{r},t) \\right] \\Psi(\\mathbf{r},t) $$

여기서 \\( \\hbar \\)는 디랙 상수입니다.`;

        // 1. LaTeX 렌더링 함수
        function renderLaTeX() {
            const input = document.getElementById('latex-input').value;
            const outputArea = document.getElementById('pdf-content');
            
            outputArea.innerHTML = input.replace(/\n/g, '<br>');
            
            if (window.MathJax) {
                MathJax.typesetPromise([outputArea]).then(() => {
                    console.log('LaTeX 렌더링 완료');
                }).catch((err) => {
                    console.error('MathJax 렌더링 에러:', err);
                });
            }
        }

        // 2. PDF 다운로드 함수
        function downloadPDF() {
            renderLaTeX(); 

            setTimeout(() => {
                const element = document.getElementById('pdf-content');
                const opt = {
                    margin:       15,
                    filename:     'latex_document.pdf',
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2 },
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                html2pdf().set(opt).from(element).save();
            }, 500);
        }

        // 페이지 로드 시 초기값 주입 및 렌더링
        window.onload = () => {
            document.getElementById('latex-input').value = defaultText;
            renderLaTeX();
        };
    </script>
</body>
</html>
